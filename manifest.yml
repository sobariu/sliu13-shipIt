modules:
  macro:
    - key: workjournalcommand-hello-world-macro
      resource: main
      render: native
      resolver:
        function: resolver
      title: What Have I Done?
      description: Create a daily, weekly, monthly, or quarterly work journal page.
      icon: https://raw.githubusercontent.com/sobariu/sliu13-shipIt/main/whathaveidonelogo.png
      config:
        resource: config
        render: native
  function:
    - key: resolver
      handler: index.handler
resources:
  - key: main
    path: src/frontend/index.jsx
  - key: config
    path: src/frontend/config.jsx
permissions:
  scopes:
    - read:confluence-space.summary
    - read:confluence-content.all
    - write:confluence-content
    - read:space:confluence
app:
  runtime:
    name: nodejs24.x
    memoryMB: 256
    architecture: arm64
  id: ari:cloud:ecosystem::app/0282fdb0-5e8f-4085-b553-247ff1dc0dcc
