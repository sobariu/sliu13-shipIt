modules:
  macro:
    - key: workjournalcommand-hello-world-macro
      resource: main
      render: native
      resolver:
        function: resolver
      title: WhatHaveIDone?
  function:
    - key: resolver
      handler: index.handler
    - key: action-handler
      handler: index.actionHandler
resources:
  - key: main
    path: src/frontend/index.jsx
permissions:
  scopes:
    - read:confluence-space.summary
    - read:confluence-content.all
    - write:confluence-content
    # Required for Confluence v2 API: read spaces and create pages
    - read:space:confluence
    - write:page:confluence
    # Required for searching Confluence pages via CQL (rest/api/content/search)
    - search:confluence
    # Required for searching Jira issues via JQL (rest/api/3/search)
    - read:jira-work
app:
  runtime:
    name: nodejs24.x
    memoryMB: 256
    architecture: arm64
  id: ari:cloud:ecosystem::app/0282fdb0-5e8f-4085-b553-247ff1dc0dcc
